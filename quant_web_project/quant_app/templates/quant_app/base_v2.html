{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Piyasa Pusulam{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'quant_app/css/style.css' %}">

<link rel="stylesheet" href="{% static 'quant_app/css/yeni_arayuz.css' %}">
<link rel="stylesheet" href="{% static 'quant_app/css/tasarim_cila.css' %}">
<script src="{% static 'quant_app/js/limit_sistemi.js' %}"></script>
<script src="{% static 'quant_app/js/sembol_format.js' %}"></script>
<script src="{% static 'quant_app/js/para_birimi.js' %}"></script>
{% block extra_head %}{% endblock %}
</head>
<body>
<!-- 🆕 Sidebar toggle butonu — sidebar'ın DIŞINDA, her zaman görünür -->
<button class="sidebar-toggle-buton-fixed" id="sidebar-toggle-buton-fixed" title="Sidebar'ı kapat/aç">☰</button>

<div id="limit-modal-overlay" class="limit-modal-overlay hidden">
  <div class="limit-modal-kutu">
    <button class="limit-modal-x" onclick="limitModalKapat()">✕</button>
    <div class="limit-modal-icon">🔒</div>
    <div id="limit-modal-mesaj" class="limit-modal-mesaj"></div>
    <a id="limit-modal-link" href="#" class="limit-modal-buton">Ücretli Planları Görüntüle →</a>
  </div>
</div>
<div id="ucretli-toast" class="ucretli-toast hidden">🔒 Ücretli Üyelik Gerektirir</div>

<div class="yeni-layout">


  {% include 'quant_app/_sidebar_yeni.html' %}
  <main class="yeni-ana-icerik">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
